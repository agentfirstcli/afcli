name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: goreleaser release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for goreleaser changelog/.GitCommit)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Set up QEMU (multi-arch image-layer assembly)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "2.15.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Pin goreleaser's current tag to the workflow's triggering ref. Without
          # this, goreleaser falls back to `git describe --tags`, which is
          # non-deterministic when stable + RC tags share a commit (the actions/checkout
          # fetch order can resolve to either). Caused v0.1.1 to re-publish RC.2 artefacts.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: regenerate-badge
        if: ${{ !contains(github.ref, '-rc.') }}
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: regenerate-badge-run
        if: ${{ !contains(github.ref, '-rc.') }}
        env:
          AFCLI_DETERMINISTIC: "1"
        run: |
          go build -o /tmp/afcli ./cmd/afcli
          /tmp/afcli audit /tmp/afcli --probe --descriptor afcli.yaml --badge --badge-out docs
          if git diff --quiet docs/badge.svg docs/badge.json; then
            echo "no badge change"
            exit 0
          fi
          git config user.email "goreleaserbot@users.noreply.github.com"
          git config user.name "goreleaserbot"
          git add docs/badge.svg docs/badge.json
          git commit -m "chore(badge): regenerate after ${GITHUB_REF_NAME}"
          git push origin HEAD:main
