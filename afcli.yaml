format_version: "1"
target: "afcli"
commands:
  safe:
    - "--version"
    - "--help"
    - "--help-schema"
    - "version"
    - "help"
    - "manifest list"
    - "manifest --help"
    - "audit --help"
    - "inspect --help"
    - "init --help"
    - "completion --help"
  destructive:
    - "init"
    - "inspect"
  nondeterministic: []
env: {}
# P16 (destructive-operation warnings) does not apply: afcli is a
# read-only auditor — its only writes are user-requested artefacts
# (`init` writes a descriptor, `audit --badge` writes the requested
# output dir). No flag bypasses confirmation, no operation is
# irreversible, no documented danger keywords belong in --help.
skip_principles:
  - "P16"
relax_principles: {}
