version: 2

project_name: afcli

before:
  hooks:
    - go mod tidy

builds:
  - id: afcli
    main: ./cmd/afcli
    binary: afcli
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=readonly
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/agentfirstcli/afcli/internal/version.Version={{.Version}}
      - -X github.com/agentfirstcli/afcli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/agentfirstcli/afcli/internal/version.Date={{.Date}}

archives:
  - id: afcli
    ids:
      - afcli
    name_template: "afcli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# S03: Docker Hub multi-arch image. Per-arch builds tag
# `agentfirstcli/afcli:{{ .Version }}-<arch>` off distroless static. Manifest
# list assembly is push-only (added in T02) so snapshot does not produce one.
# Publishers (release/brew/docker) stay disabled until S04 flips
# release.disable=false alongside the tag-triggered workflow.
dockers:
  - id: afcli-amd64
    ids:
      - afcli
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "agentfirstcli/afcli:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/agentfirstcli/afcli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
  - id: afcli-arm64
    ids:
      - afcli
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "agentfirstcli/afcli:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/agentfirstcli/afcli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

release:
  disable: true

changelog:
  disable: true

# S02: Homebrew tap auto-commit. Snapshot disables all publishers, so the
# {{ .Env.HOMEBREW_TAP_TOKEN }} reference is harmless when unset locally.
# Per D006, RC formulas commit too — do NOT set skip_upload.
brews:
  - name: afcli
    ids:
      - afcli
    repository:
      owner: agentfirstcli
      name: homebrew-afcli
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    # release.disable=true means goreleaser cannot auto-derive the formula's
    # url_template from the GitHub Release URL — we must spell it out. S04
    # flips release.disable=false; the URL pattern stays the same either way.
    url_template: "https://github.com/agentfirstcli/afcli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/agentfirstcli/afcli"
    description: "Agent-first CLI auditor for Claude skill descriptors."
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "afcli {{ .Tag }} formula update"
    install: |
      bin.install "afcli"
    test: |
      system "#{bin}/afcli", "--version"
